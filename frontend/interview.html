<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI — Interview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/interview.css">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <div class="logo-mark">AI</div>
    <div class="nav-session-info">
      <span class="nav-role" id="nav-role">Loading…</span>
      <span class="nav-meta" id="nav-meta"></span>
    </div>
  </div>
  <div class="nav-right">
    <div class="timer-wrap">
      <svg class="timer-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/></svg>
      <span class="timer-txt" id="timer">00:00</span>
    </div>
    <button class="btn-end" onclick="confirmEnd()">End Session</button>
  </div>
</nav>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>

<!-- BODY -->
<div class="body">
  <div class="interview-wrap">

    <!-- Q HEADER -->
    <div class="q-header">
      <div class="q-num-badge">
        <span class="q-num" id="q-num-label">Q1</span>
        <span class="q-type-tag tag-technical" id="q-type-tag">Technical</span>
      </div>
      <div class="q-dots" id="q-dots"></div>
    </div>

    <!-- QUESTION CARD -->
    <div class="q-card">
      <div class="q-card-top">
        <div class="ai-avatar">🤖</div>
        <div>
          <div class="ai-label">AI Interviewer</div>
          <div class="ai-sublabel">InterviewAI · Personalised</div>
        </div>
      </div>
      <div id="q-text" class="q-text loading">
        <div class="thinking"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>
      </div>
      <div id="q-hint-box" class="hint-box"></div>
      <button class="hint-btn" id="hint-btn" onclick="toggleHint()" style="display:none">
        💡 Show hint
      </button>
    </div>

    <!-- ANSWER CARD -->
    <div class="answer-card" id="answer-card">
      <div class="answer-label">
        <span>Your Answer</span>
        <span class="char-count"><span id="char-num" style="color:var(--blue)">0</span> chars</span>
      </div>
      <textarea id="ans-input" rows="7" placeholder="Type your answer here… Structure your thoughts, use examples, take your time." oninput="onType()"></textarea>
      <div class="answer-actions">
        <div class="action-left">
          <button class="btn-ghost" onclick="skipQ()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
            Skip
          </button>
          <button class="btn-ghost" onclick="clearAns()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            Clear
          </button>
        </div>
        <button class="btn-submit" id="submit-btn" onclick="submitAns()" disabled>
          <span id="submit-label">Submit Answer</span>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- ANSWERED HISTORY -->
    <div id="answered-section" style="display:none">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px">Completed</div>
      <div class="answered-list" id="answered-list"></div>
    </div>

  </div>
</div>

<!-- END MODAL -->
<div class="modal-backdrop" id="end-modal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">End session early?</div>
    <div class="modal-sub">You've answered <span id="modal-answered">0</span> of <span id="modal-total">0</span> questions. Your progress will still be evaluated.</div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Keep going</button>
      <button class="btn-modal-confirm" onclick="finishSession()">End & See Results</button>
    </div>
  </div>
</div>

<script>
const setup = JSON.parse(sessionStorage.getItem('iaiSetup') || '{}');
const role     = setup.role      || 'Software Engineer';
const level    = setup.level     || 'Fresher';
const skills   = setup.skills    || ['Python','SQL'];
const generatedQuestions =
  JSON.parse(
    sessionStorage.getItem("generatedQuestions")
  ) || [];

const qCount = generatedQuestions.length || 3;
const focus    = setup.focus     || [];

document.getElementById('nav-role').textContent = role;
document.getElementById('nav-meta').textContent = `${level} · ${qCount} questions`;

let currentQ = 0;

let answered = [];
let hintShown = false;
let currentQuestion = null;
let timerSec = 0;
let timerInterval;

// TIMER
function startTimer() {
  timerInterval = setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec/60)).padStart(2,'0');
    const s = String(timerSec%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}
startTimer();

// DOTS
function renderDots() {
  const el = document.getElementById('q-dots');
  el.innerHTML = Array.from({length:qCount},(_,i)=>`
    <div class="dot ${i<currentQ?'done':i===currentQ?'active':''}"></div>
  `).join('');
}
renderDots();

// PROGRESS
function updateProgress() {
  document.getElementById('prog-bar').style.width = (currentQ/qCount*100)+'%';
}

// TYPE HANDLER
function onType() {
  const v = document.getElementById('ans-input').value;
  document.getElementById('char-num').textContent = v.length;
  document.getElementById('submit-btn').disabled = v.trim().length < 10;
}
function clearAns() {
  document.getElementById('ans-input').value='';
  document.getElementById('char-num').textContent='0';
  document.getElementById('submit-btn').disabled=true;
}

// HINT
function toggleHint() {
  hintShown = !hintShown;
  const box = document.getElementById('q-hint-box');
  box.classList.toggle('show', hintShown);
  document.getElementById('hint-btn').textContent = hintShown ? '🙈 Hide hint' : '💡 Show hint';
}

// TYPE TAG
const tagClasses = { Technical:'tag-technical', Behavioral:'tag-behavioral', 'System Design':'tag-systemdesign', 'Problem Solving':'tag-problemsolving' };
function setTypeTag(type) {
  const el = document.getElementById('q-type-tag');
  el.className = 'q-type-tag';
  el.classList.add(tagClasses[type] || 'tag-technical');
  el.textContent = type;
}

// GENERATE QUESTION
function generateQuestion() {


  console.log("Questions:", generatedQuestions);
  console.log("CurrentQ:", currentQ);

  const q = generatedQuestions[currentQ];

  console.log("Current Question:", q);

  
  const qEl   = document.getElementById('q-text');
  const hBtn  = document.getElementById('hint-btn');
  const hBox  = document.getElementById('q-hint-box');

 

  if (!q) {
    finishSession();
    return;
  }

  currentQuestion = {
    question: q.questionText,
    type: "Technical",
    hint: "Think about the core concepts and explain with examples."
  };

  document.getElementById(
    'q-num-label'
  ).textContent = `Q${currentQ + 1}`;

  qEl.classList.remove('loading');
  qEl.textContent = q.questionText;

  hBox.textContent =
    currentQuestion.hint;

  setTypeTag("Technical");

  hBtn.style.display = 'flex';

  clearAns();
}

// SUBMIT
function submitAns() {
  const ans = document.getElementById('ans-input').value.trim();
  if(ans.length < 10) return;
  recordAnswer(ans);
}
function skipQ() {
  recordAnswer('[Skipped]');
}
function recordAnswer(ans) {
  answered.push({ q: currentQuestion?.question||'', type: currentQuestion?.type||'Technical', hint: currentQuestion?.hint||'', a: ans });
  addToHistory(answered.length, currentQuestion?.question||'', ans);
  currentQ++;
  updateProgress();
  if(currentQ >= qCount) {
    finishSession();
  } else {
    renderDots();
    generateQuestion();
  }
}

// HISTORY LIST
function addToHistory(num, q, a) {
  const sec = document.getElementById('answered-section');
  const list = document.getElementById('answered-list');
  sec.style.display = 'block';
  const item = document.createElement('div');
  item.className = 'answered-item';
  item.innerHTML = `<div class="answered-num">${num}</div><div style="flex:1;min-width:0"><div class="answered-q">${q}</div><div class="answered-a">${a==='[Skipped]'?'<span style="color:var(--text3);font-style:italic">Skipped</span>':a}</div></div>`;
  list.insertBefore(item, list.firstChild);
}

// END
function confirmEnd() {
  document.getElementById('modal-answered').textContent = answered.length;
  document.getElementById('modal-total').textContent = qCount;
  document.getElementById('end-modal').classList.add('show');
}
function closeModal() { document.getElementById('end-modal').classList.remove('show'); }
function finishSession() {
  clearInterval(timerInterval);
  const results = { role, level, skills, qCount, focus, answered, duration: timerSec };
  sessionStorage.setItem('iaiResults', JSON.stringify(results));
  window.location.href = 'results.html';
}

// INIT
generateQuestion();
</script>
</body>
</html>
