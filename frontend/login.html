<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="./css/login.css">
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon"><i class="ti ti-brain"></i></div>
    <h1 class="logo-title">InterviewAI</h1>
    <p class="logo-sub">Practice. Improve. Get hired.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="pane active" id="pane-login">
      <div class="form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
          <p class="error-msg" id="login-email-err">Please enter a valid email.</p>
        </div>
        <div class="field">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
          <p class="error-msg" id="login-pass-err">Password must be at least 6 characters.</p>
        </div>
        <button class="btn-primary" id="login-btn" onclick="handleLogin()">
          Sign in <i class="ti ti-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="pane" id="pane-register">
      <div class="form">
        <div class="field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" placeholder="Mohd Yusuf" autocomplete="name">
          <p class="error-msg" id="reg-name-err">Name is required.</p>
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
          <p class="error-msg" id="reg-email-err">Please enter a valid email.</p>
        </div>
        <div class="field">
          <label for="reg-pass">Password</label>
          <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password">
          <p class="error-msg" id="reg-pass-err">Password must be at least 6 characters.</p>
        </div>
        <button class="btn-primary" id="reg-btn" onclick="handleRegister()">
          Create account <i class="ti ti-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <p class="hint" id="hint-text">Demo mode: any credentials will work</p>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('pane-login').classList.toggle('active', tab === 'login');
    document.getElementById('pane-register').classList.toggle('active', tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showErr(id, show) {
    const el = document.getElementById(id);
    el.style.display = show ? 'block' : 'none';
    document.getElementById(id.replace('-err', '')).classList.toggle('error', show);
  }

  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  // ─── CONNECT YOUR BACKEND HERE ───────────────────────────────────────────
  // Replace the contents of handleLogin() and handleRegister() with your
  // actual API calls. Example Flask endpoints:
  //   POST /api/login    { email, password }  → { token, name }
  //   POST /api/register { name, email, password } → { token, name }
  // After a successful response, store the token and redirect to dashboard:
  //   localStorage.setItem('token', data.token);
  //   localStorage.setItem('userName', data.name);
  //   window.location.href = 'dashboard.html';
  // ─────────────────────────────────────────────────────────────────────────

 async function handleLogin() {
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;

  try {
    const res = await fetch("https://ai-based-interview-prep-tool.onrender.com/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password: pass
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message || "Login failed");
    }
    
localStorage.setItem("token", data.token);
localStorage.setItem("userId", data.user.id);   // ← Add this
localStorage.setItem("userName", data.user.name);
localStorage.setItem("userEmail", data.user.email);

alert("Login Successful!");
window.location.href = "dashboard.html";
  } catch (err) {
    console.error(err);
    document.getElementById("hint-text").textContent = err.message;
    document.getElementById("hint-text").style.color = "var(--danger)";
  }
}

    async function handleRegister() {
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pass = document.getElementById("reg-pass").value;

  try {
    const res = await fetch("https://ai-based-interview-prep-tool.onrender.com/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password: pass
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message || "Registration failed");
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("userId", data.user.id);   // ← Add this
    localStorage.setItem("userName", data.user.name);
    localStorage.setItem("userEmail", data.user.email);

    alert("Registration Successful!");
    window.location.href = "dashboard.html";

  } catch (err) {
    alert(err.message);
    console.error(err);
  }
}

  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
