<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="./css/results.css">
</head>
<body>

<div class="ambient a1"></div>
<div class="ambient a2"></div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="load-ring"></div>
  <div class="load-txt">Analysing your performance…</div>
  <div class="load-sub">AI is reviewing your answers</div>
</div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="dashboard.html">
    <div class="logo-mark">AI</div>
    <span class="logo-text">Interview<span>AI</span></span>
  </a>
  <div class="nav-actions">
    <a class="btn-outline" href="dashboard.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a class="btn-primary-sm" href="setup.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Retry
    </a>
  </div>
</nav>

<main id="main-content" style="display:none">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">Session Complete 🎉</div>
    <div class="score-ring-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="10"/>
        <circle cx="80" cy="80" r="68" fill="none" id="score-arc"
          stroke="#4f7fff" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="427" stroke-dashoffset="427"
          style="transition:stroke-dashoffset 1.4s cubic-bezier(.25,.46,.45,.94)"/>
      </svg>
      <span class="score-num" id="score-num">—</span>
    </div>
    <h1 class="hero-label" id="score-label">—</h1>
    <p class="hero-desc" id="score-desc">—</p>
    <div class="session-meta">
      <div class="meta-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Role: <span class="meta-val" id="meta-role">—</span>
      </div>
      <div class="meta-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Level: <span class="meta-val" id="meta-level">—</span>
      </div>
      <div class="meta-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/></svg>
        Duration: <span class="meta-val" id="meta-duration">—</span>
      </div>
      <div class="meta-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        Answered: <span class="meta-val" id="meta-answered">—</span>
      </div>
    </div>
  </div>

  <!-- CHARTS ROW -->
  <div class="results-grid" style="margin-bottom:28px">
    <div class="card">
      <div class="card-title">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Question-by-Question Scores
      </div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
        Skill Performance
      </div>
      <div id="skill-bars"></div>
    </div>
  </div>

  <!-- IMPROVEMENT -->
  <div class="improve-card" id="improve-card">
    <div class="improve-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      AI Coach Recommendations
    </div>
    <p class="improve-txt" id="improve-txt">Loading…</p>
  </div>

  <!-- Q FEEDBACK -->
  <div style="margin-bottom:28px">
    <div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:17px;height:17px;opacity:.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Detailed Feedback
    </div>
    <div id="feedback-list"></div>
  </div>

  <!-- CTA -->
  <div class="cta-row">
    <a class="btn-cta-lg" href="setup.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Practice Again
    </a>
    <a class="btn-cta-ghost" href="dashboard.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Back to Dashboard
    </a>
  </div>

</main>

<script>
const data = JSON.parse(sessionStorage.getItem('iaiResults') || '{}');
const { role='Software Engineer', level='Fresher', skills=[], qCount=3, answered=[], duration=0 } = data;

// META
document.getElementById('meta-role').textContent = role;
document.getElementById('meta-level').textContent = level;
document.getElementById('meta-answered').textContent = `${answered.length} / ${qCount}`;
const mins = Math.floor(duration/60), secs = duration%60;
document.getElementById('meta-duration').textContent = `${mins}m ${secs}s`;

// Stars helper
function stars(n) {
  return Array.from({length:5},(_,i)=>`
    <svg class="star ${i<n?'filled':'empty'}" viewBox="0 0 20 20" fill="currentColor">
      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
    </svg>
  `).join('');
}

function scoreColor(s) {
  if(s>=85) return 'var(--green)';
  if(s>=70) return 'var(--blue)';
  if(s>=55) return 'var(--amber)';
  return 'var(--red)';
}
async function loadResults() {

  if (!answered.length) {
    renderResults({
      score: 74,
      label: 'Good Effort',
      description: 'You demonstrated solid foundational knowledge with room to sharpen specific technical concepts.',
      feedback: [
        {qnum:1,rating:4,strength:'Clear explanation with good structure.',weakness:'Could include more concrete examples.'},
        {qnum:2,rating:3,strength:'Good understanding of core concepts.',weakness:'Answer lacked depth on edge cases.'},
        {qnum:3,rating:4,strength:'Excellent use of the STAR method.',weakness:'Time management could be improved.'},
      ],
      skill_scores: [
        {skill:'Communication',score:82},
        {skill:'Technical Depth',score:68},
        {skill:'Problem Solving',score:74},
        {skill:'Clarity',score:80}
      ],
      improvement: 'Focus on deepening your knowledge of system design patterns and include specific metrics when describing past projects.'
    });

    return;
  }

  try {

 const token = localStorage.getItem("token");

const res = await fetch(
  "http://localhost:5000/api/ai/evaluate",
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({
      role,
      level,
      skills,
      answered
    })
  }
);

    if (!res.ok) {
      throw new Error("Evaluation failed");
    }

    const data = await res.json();

    renderResults(data);

  } catch (e) {

    console.error("Evaluation Error:", e);

    renderResults({
      score:72,
      label:'Good Effort',
      description:'You showed solid fundamentals with opportunities to deepen specific areas.',
      feedback: answered.map((_,i)=>({
        qnum:i+1,
        rating:3,
        strength:'Structured response with clear intent.',
        weakness:'More specific examples would strengthen this answer.'
      })),
      skill_scores:[
        {skill:'Communication',score:78},
        {skill:'Technical Depth',score:65},
        {skill:'Problem Solving',score:72},
        {skill:'Clarity',score:75},
        {skill:'Depth of Knowledge',score:62}
      ],
      improvement:'Practice the STAR method for behavioral questions. Focus on quantifying results and using specific technical examples.'
    });

  }
}

function renderResults(r) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  // SCORE RING
  const pct = r.score/100;
  const circ = 427;
  const offset = circ - (circ * pct);
  const arc = document.getElementById('score-arc');
  arc.style.stroke = scoreColor(r.score);
  setTimeout(() => { arc.style.strokeDashoffset = offset; }, 200);
  document.getElementById('score-num').textContent = r.score+'%';
  document.getElementById('score-num').style.color = scoreColor(r.score);
  document.getElementById('score-label').textContent = r.label;
  document.getElementById('score-desc').textContent = r.description;

  // IMPROVEMENT
  document.getElementById('improve-txt').textContent = r.improvement;

  // BAR CHART
  const scores = (r.feedback||[]).map(f=>f.rating*20);
  const labels = (r.feedback||[]).map((f,i)=>`Q${f.qnum||i+1}`);
  const bColors = scores.map(s => s>=80?'rgba(46,204,138,.8)':s>=60?'rgba(79,127,255,.8)':'rgba(245,166,35,.8)');
  new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{ labels, datasets:[{ data:scores, backgroundColor:bColors, borderRadius:6, borderSkipped:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#12151f', borderColor:'rgba(255,255,255,.1)', borderWidth:1, titleColor:'#e4e8f5', bodyColor:'#7c86a0', padding:10, callbacks:{ label:ctx=>` Score: ${ctx.raw}%` } } },
      scales:{
        x:{ grid:{display:false}, ticks:{color:'#4a5168',font:{size:12}} },
        y:{ min:0,max:100, grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#4a5168',font:{size:11},callback:v=>v+'%'} }
      }
    }
  });

  // SKILL BARS
  const sb = document.getElementById('skill-bars');
  sb.innerHTML = (r.skill_scores||[]).map(s=>`
    <div class="skill-row">
      <div class="skill-name">${s.skill}</div>
      <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:0%;background:${scoreColor(s.score)}" data-target="${s.score}"></div></div>
      <div class="skill-pct" style="color:${scoreColor(s.score)}">${s.score}%</div>
    </div>
  `).join('');
  setTimeout(()=>{
    document.querySelectorAll('.skill-bar-fill').forEach(b=>{ b.style.width = b.dataset.target+'%'; });
  }, 300);

  // FEEDBACK LIST
  const fl = document.getElementById('feedback-list');
  fl.innerHTML = (r.feedback||[]).map((f,i)=>{
    const ans = answered[i]?.a || '';
    return `
    <div class="q-feedback">
      <div class="qf-header" onclick="toggleFeedback(this)">
        <div class="qf-q">${answered[i]?.q || 'Question '+(f.qnum||i+1)}</div>
        <div class="qf-meta">
          <div class="stars">${stars(f.rating||3)}</div>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--text3);transition:transform .2s;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div class="qf-body">
        <div class="qf-answer">${ans==='[Skipped]'?'<em style="color:var(--text3)">You skipped this question.</em>':ans}</div>
        <div class="qf-row"><div class="qf-dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div><div class="qf-txt-good">${f.strength}</div></div>
        <div class="qf-row"><div class="qf-dot" style="background:var(--amber);box-shadow:0 0 5px var(--amber)"></div><div class="qf-txt-imp">${f.weakness}</div></div>
      </div>
    </div>`;
  }).join('');

  // Save to localStorage history
  try {
    const hist = JSON.parse(localStorage.getItem('iaiHistory')||'[]');
    hist.push({ role, experience:level, score:r.score, date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}) });
    localStorage.setItem('iaiHistory', JSON.stringify(hist.slice(-20)));
  } catch(e){}
}

function toggleFeedback(header) {
  const body = header.nextElementSibling;
  const arr  = header.querySelector('svg:last-child');
  const open = body.classList.toggle('open');
  body.style.display = open ? 'block' : 'none';
  if(arr) arr.style.transform = open ? 'rotate(180deg)' : '';
}

loadResults();
</script>
</body>
</html>
